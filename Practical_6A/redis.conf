# Redis ACL Configuration for DBS Practical 6A
# This configuration demonstrates role-based access control using Redis ACL

# ===== ACL Users Configuration =====

# Disable default user (no password = disabled)
user default off

# Admin user: full access (only for instructor/DBA)
# - on: enables the user
# - >adminStrongPwd: password
# - ~*: can access all keys
# - +@all: can run all commands
user admin on >adminStrongPwd ~* +@all

# Application user: can only read/write session keys
# - Can access keys matching "session:*" pattern
# - Can only run get, set, del, expire, ttl, and connection commands
user app_user on >appStrongPwd ~session:* +get +set +del +expire +ttl +@connection

# Read-only monitoring user: can read all keys and run monitoring commands
# - Can access all keys (~*)
# - Can only read commands (+@read) and monitoring commands
user monitoring on >monitorPwd ~* +@read +info +dbsize +lastsave +@connection

# ===== Server Configuration =====
port 6379
bind 127.0.0.1
timeout 0
tcp-keepalive 300

# ===== RDB Snapshot Configuration =====
save 900 1
save 300 10
save 60 10000
rdbcompression yes
dbfilename dump.rdb

# ===== AOF Configuration =====
appendonly no

# ===== Memory Policy =====
maxmemory-policy allkeys-lru

# ===== Logging =====
loglevel notice
databases 16
